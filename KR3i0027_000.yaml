body:
  text: 提要酒譜一卷譜録類二飲饌之屬臣等謹按酒譜宋竇苹撰苹字子野汶上人晁公武讀書志載苹有新唐書音訓四卷在吳縝之前當為仁宗時人公武稱其學問精博盖亦好古之士别本有刻作竇鞏者然詳其名字乃有取於鹿鳴之詩作苹字者是也其書雜叙酒之故事寥寥數條似有脱佚然宋志著録實作一卷觀其始於酒名終於酒令首尾已具知原本僅止於此大抵摘取新頴字句以供採掇與譜録之體亦稍有不同其引杜甫少年行醉倒終同卧竹根句謂以竹根為飲器乃千家註所未及亦足以廣異聞焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:51c5b0c905eadfabe87cf566bb1211d8879ed2cd1124e94718026ed298f0cf21
