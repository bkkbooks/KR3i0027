body:
  text: 提要酒譜一卷譜録類二飲饌之屬臣等謹按酒譜宋竇蘋撰蘋字子野汶上人朝公武讀書志載蘋有新唐書音訓四卷在吳縝之前當為仁宗時人公武稱其學問精博蓋亦好古之士别本有刻作竇鞏者然詳其名字乃有取於鹿鳴之詩作蘋字者是也其書雜敘酒之故事寥寥數條似有脫佚然宋志著録實作一卷觀其始於酒名終於酒令首尾已具知原本僅止於此大抵摘取新頴字句以供採掇與譜録之體亦稍有不同其引杜甫少年行醉倒終同卧竹根句謂以竹根為飲器乃千家注所未及亦足以廣異聞焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1553934b257a53a8cfdc42bc4e048c5784634bbfef6bbd7001f1caac52f5fd5f
