body:
  text: 酒譜宋竇苹撰酒名説文曰酴酒母也醴一宿酒也醪滓汁酒也酎三重酒也醨薄酒也醑莤酒也歡伯酒為歡伯其義見易林無貴賤賢不肖中外共甘而樂之㰂酒皮日休詩云明朝有物充君信㰂酒三瓶寄夜航㰂酒江外酒名酒旗韓非子云宋人沽酒懸幟甚髙酒市有旗始見於此或謂之帘劉白墮江東人劉白墮善釀六月以甖盛酒於日中經旬味不動而愈香美使人久醉朝士千里相饋號白鶴觴亦名騎驢酒醉聖李白每醉為文未嘗差人目為醉聖白樂天自稱醉尹皮日休自稱醉士祖台州書晉祖台州與王荆州書古人以酒為戒願君屏爵棄巵焚罍毁榼殛儀狄於羽山放杜康於三危崑崙觴魏賈鏘有奴善别水嘗乘舟於黄河中流以匏瓠接河源水七八升經宿色如絳以釀酒名崑崙觴芳味絶妙般若湯北僧謂為般若湯蓋廋詞以避法禁卧黍穰凡人醉卧黍穰中必成癩醉而飲茶必發膀胱氣食鹹多成消中癭木杯松林唱和有癭木杯詩蓋用木節為之竹根老杜詩云醉倒終同卧竹根蓋以竹根為飲器也見江淹集蓮子杯唐人有蓮子杯白公詩中稱之周穆王時有杯名常滿安石榴頓孫國有安石榴取汁停盆中數日成美酒酒令酒令云孟嘗門下三千客大有同人湟水渡頭十萬羊未濟小畜又云鋤麑觸槐死作木邊之鬼豫讓吞炭終為山下之灰又云夏禹見雨下使李牧送木履與蕭何蕭何道何消田單定墾田使貢禹送禹貢與李徳李德云得履又云寺裏餵牛僧茹草觀中煑菜道供柴又曰山上採黄芩下山逢著老翁吟老翁吟云白頭搔更短渾欲不勝簪上山採交藤下山逢著醉胡僧醉胡僧云何年飲著聞聲酒直到而今醉不醒山上採烏頭下山逢著少年遊少年遊云霞鞍金口騮豹袖紫貂裘又云碾茶曹子建開匣木懸虛酒譜
